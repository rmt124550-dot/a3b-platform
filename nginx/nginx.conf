events {
  worker_connections 1024;
}

http {
  # ─── Gzip ─────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # ─── Rate limiting ────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ─── Upstream services ────────────────────
  upstream frontend {
    server frontend:3000;
  }

  upstream backend {
    server backend:4000;
  }

  # ─── HTTP → HTTPS redirect ────────────────
  server {
    listen 80;
    server_name a3bhub.cloud www.a3bhub.cloud api.a3bhub.cloud;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── Frontend — a3bhub.cloud ──────────────
  server {
    listen 443 ssl http2;
    server_name a3bhub.cloud www.a3bhub.cloud;

    ssl_certificate /etc/letsencrypt/live/a3bhub.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/a3bhub.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # ─── Backend API — api.a3bhub.cloud ───────
  server {
    listen 443 ssl http2;
    server_name api.a3bhub.cloud;

    ssl_certificate /etc/letsencrypt/live/a3bhub.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/a3bhub.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";

    # Auth endpoints — rate limit agresivo
    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook de Stripe — sin rate limit
    location /api/billing/webhook {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # API general
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
