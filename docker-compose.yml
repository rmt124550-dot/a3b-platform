version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: a3b_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - a3b_net

  redis:
    image: redis:7-alpine
    container_name: a3b_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - a3b_net

  backend:
    image: grover1249/a3b-backend:latest
    pull_policy: always
    container_name: a3b_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - DEEPL_API_KEY=${DEEPL_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
    labels:
      # Prioridad alta para ganar sobre containers viejos conflictivos
      - "traefik.http.routers.compose-hack-haptic-hard-drive-755gto-37-web.priority=200"
      - "traefik.http.routers.compose-hack-haptic-hard-drive-755gto-37-websecure.priority=200"
    networks:
      - a3b_net

  frontend:
    image: grover1249/a3b-frontend:latest
    pull_policy: always
    container_name: a3b_frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    labels:
      # Prioridad alta para ganar sobre containers viejos conflictivos
      - "traefik.http.routers.compose-hack-haptic-hard-drive-755gto-38-web.priority=200"
      - "traefik.http.routers.compose-hack-haptic-hard-drive-755gto-38-websecure.priority=200"
      - "traefik.http.routers.compose-hack-haptic-hard-drive-755gto-39-web.priority=200"
      - "traefik.http.routers.compose-hack-haptic-hard-drive-755gto-39-websecure.priority=200"
    networks:
      - a3b_net

volumes:
  postgres_data:
  redis_data:

networks:
  a3b_net:
    driver: bridge
