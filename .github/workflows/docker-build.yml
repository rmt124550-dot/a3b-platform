name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_USER: grover1249

jobs:
  build-backend:
    name: Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push Backend (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            grover1249/a3b-backend:latest
            grover1249/a3b-backend:${{ github.sha }}

  build-frontend:
    name: Frontend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push Frontend (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            grover1249/a3b-frontend:latest
            grover1249/a3b-frontend:${{ github.sha }}

  deploy:
    name: Redeploy Dokploy
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Trigger redeploy
        run: |
          curl -s -X POST "http://163.176.155.185:3000/api/compose.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"composeId": "qvQyYaNuIbH8PncF780uU"}'
          echo "✅ Redeploy disparado"
