name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_USER: grover1249

jobs:
  # ── Build amd64 ───────────────────────────
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push ${{ matrix.service }} (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: grover1249/a3b-${{ matrix.service }}:amd64

  # ── Build arm64 (native runner) ───────────
  build-arm64:
    name: Build arm64
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push ${{ matrix.service }} (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: grover1249/a3b-${{ matrix.service }}:arm64

  # ── Merge manifest multi-arch ─────────────
  merge-manifest:
    name: Merge multi-arch manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Create & push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t grover1249/a3b-${{ matrix.service }}:latest \
            grover1249/a3b-${{ matrix.service }}:amd64 \
            grover1249/a3b-${{ matrix.service }}:arm64
          echo "✅ Multi-arch manifest creado para a3b-${{ matrix.service }}"

  # ── Redeploy en Dokploy ───────────────────
  deploy:
    name: Redeploy Dokploy
    runs-on: ubuntu-latest
    needs: [merge-manifest]
    steps:
      - name: Trigger redeploy
        run: |
          curl -s -X POST "http://163.176.155.185:3000/api/compose.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"composeId": "qvQyYaNuIbH8PncF780uU"}'
          echo "✅ Redeploy disparado"
