name: 🚀 Build, Push & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build (backend | frontend | all)'
        required: false
        default: 'all'
      skip_frontend:
        description: 'Skip frontend build to save time'
        required: false
        type: boolean
        default: false

env:
  DOCKER_USER: grover1249
  DOKPLOY_COMPOSE_ID: qvQyYaNuIbH8PncF780uU
  DOKPLOY_URL: http://163.176.155.185:3000
  API_URL: https://api.a3bhub.cloud

jobs:
  # ── Detectar qué cambió ─────────────────────────────────────────────────────
  changes:
    name: 🔍 Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ── Build backend amd64 ─────────────────────────────────────────────────────
  build-backend-amd64:
    name: 🏗️ Backend amd64
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push backend (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKER_USER }}/a3b-backend:amd64
          cache-from: type=gha,scope=amd64-backend
          cache-to: type=gha,mode=max,scope=amd64-backend

  # ── Build backend arm64 ─────────────────────────────────────────────────────
  build-backend-arm64:
    name: 🏗️ Backend arm64
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push backend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          tags: ${{ env.DOCKER_USER }}/a3b-backend:arm64
          cache-from: type=gha,scope=arm64-backend
          cache-to: type=gha,mode=max,scope=arm64-backend

  # ── Build frontend amd64 ────────────────────────────────────────────────────
  build-frontend-amd64:
    name: 🎨 Frontend amd64
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (needs.changes.outputs.frontend == 'true' ||
      github.event_name == 'workflow_dispatch') &&
      github.event.inputs.skip_frontend != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build & push frontend (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKER_USER }}/a3b-frontend:amd64
          cache-from: type=gha,scope=amd64-frontend
          cache-to: type=gha,mode=max,scope=amd64-frontend
          no-cache-filters: |
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.a3bhub.cloud

  # ── Build frontend arm64 ────────────────────────────────────────────────────
  build-frontend-arm64:
    name: 🎨 Frontend arm64
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: |
      (needs.changes.outputs.frontend == 'true' ||
      github.event_name == 'workflow_dispatch') &&
      github.event.inputs.skip_frontend != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build & push frontend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: ${{ env.DOCKER_USER }}/a3b-frontend:arm64
          cache-from: type=gha,scope=arm64-frontend
          cache-to: type=gha,mode=max,scope=arm64-frontend
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.a3bhub.cloud

  # ── Merge manifests ─────────────────────────────────────────────────────────
  merge-manifests:
    name: 📦 Merge multi-arch manifests
    runs-on: ubuntu-latest
    needs:
      - build-backend-amd64
      - build-backend-arm64
      - build-frontend-amd64
      - build-frontend-arm64
    if: always() && !cancelled()
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Merge backend manifest → :latest
        if: needs.build-backend-amd64.result == 'success' && needs.build-backend-arm64.result == 'success'
        run: |
          docker buildx imagetools create \
            -t ${{ env.DOCKER_USER }}/a3b-backend:latest \
            ${{ env.DOCKER_USER }}/a3b-backend:amd64 \
            ${{ env.DOCKER_USER }}/a3b-backend:arm64

      - name: Merge frontend manifest → :latest
        if: needs.build-frontend-amd64.result == 'success' && needs.build-frontend-arm64.result == 'success'
        run: |
          docker buildx imagetools create \
            -t ${{ env.DOCKER_USER }}/a3b-frontend:latest \
            ${{ env.DOCKER_USER }}/a3b-frontend:amd64 \
            ${{ env.DOCKER_USER }}/a3b-frontend:arm64

  # ── Deploy a Dokploy ────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy → Dokploy
    runs-on: ubuntu-latest
    needs: [merge-manifests]
    if: always() && needs.merge-manifests.result == 'success'
    steps:
      - name: Trigger Dokploy redeploy
        run: |
          RESULT=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ env.DOKPLOY_URL }}/api/compose.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"composeId": "${{ env.DOKPLOY_COMPOSE_ID }}"}')

          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -1)
          echo "Dokploy response: $BODY (HTTP $HTTP_CODE)"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Deploy queued"

      - name: Wait for container to restart
        run: sleep 60

      - name: Verify API health
        run: |
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ env.API_URL }}/health" --max-time 10)
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ API healthy (attempt $i)"
              HEALTH=$(curl -s "${{ env.API_URL }}/health")
              echo "   $HEALTH"
              exit 0
            fi
            echo "⏳ Attempt $i: HTTP $RESPONSE — retrying in 15s..."
            sleep 15
          done
          echo "❌ API did not recover after deploy"
          exit 1

      - name: Verify billing plans endpoint
        run: |
          PLANS=$(curl -s "${{ env.API_URL }}/api/billing/plans")
          echo "Plans response: $PLANS"
          if echo "$PLANS" | grep -q '"pro"'; then
            echo "✅ Billing endpoint OK"
          else
            echo "❌ Billing endpoint failed"
            exit 1
          fi
