name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_USER: grover1249

jobs:
  # ── Build amd64 ───────────────────────────────────────────────────────────
  build-amd64:
    name: Build amd64 (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Login primero — aumenta rate limit de 100 a 200 pulls/6h
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push ${{ matrix.service }} (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: grover1249/a3b-${{ matrix.service }}:amd64
          # Cache para no re-descargar node:20-alpine en cada build
          cache-from: type=gha,scope=${{ matrix.service }}-amd64
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}-amd64

  # ── Build arm64 ───────────────────────────────────────────────────────────
  build-arm64:
    name: Build arm64 (${{ matrix.service }})
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push ${{ matrix.service }} (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: grover1249/a3b-${{ matrix.service }}:arm64
          cache-from: type=gha,scope=${{ matrix.service }}-arm64
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}-arm64

  # ── Merge manifest multi-arch ─────────────────────────────────────────────
  merge-manifest:
    name: Merge manifest (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Create & push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t grover1249/a3b-${{ matrix.service }}:latest \
            grover1249/a3b-${{ matrix.service }}:amd64 \
            grover1249/a3b-${{ matrix.service }}:arm64
          echo "✅ Manifest multi-arch creado para a3b-${{ matrix.service }}"

  # ── Redeploy en Dokploy ───────────────────────────────────────────────────
  deploy:
    name: Deploy → Dokploy
    runs-on: ubuntu-latest
    needs: [merge-manifest]
    steps:
      - name: Trigger redeploy
        run: |
          curl -s -X POST "http://163.176.155.185:3000/api/compose.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"composeId": "qvQyYaNuIbH8PncF780uU"}'
          echo "✅ Redeploy disparado en Dokploy"
