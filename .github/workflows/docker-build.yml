name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_USER: grover1249

jobs:
  build-amd64:
    name: Build amd64 (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Setup Node.js (frontend only)
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Next.js static export (frontend only)
        if: matrix.service == 'frontend'
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.a3bhub.cloud
          NEXT_TELEMETRY_DISABLED: 1
        run: |
          npm ci
          npm run build

      - name: Build & push ${{ matrix.service }} (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64
          push: true
          tags: grover1249/a3b-${{ matrix.service }}:amd64
          cache-from: |
            type=gha,scope=amd64-${{ matrix.service }}
            type=registry,ref=grover1249/a3b-${{ matrix.service }}:amd64
          cache-to: type=gha,mode=max,scope=amd64-${{ matrix.service }}
          pull: false

  build-arm64:
    name: Build arm64 (${{ matrix.service }})
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Setup Node.js (frontend only)
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Next.js static export (frontend only)
        if: matrix.service == 'frontend'
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.a3bhub.cloud
          NEXT_TELEMETRY_DISABLED: 1
        run: |
          npm ci
          npm run build

      - name: Build & push ${{ matrix.service }} (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          platforms: linux/arm64
          push: true
          tags: grover1249/a3b-${{ matrix.service }}:arm64
          cache-from: |
            type=gha,scope=arm64-${{ matrix.service }}
            type=registry,ref=grover1249/a3b-${{ matrix.service }}:arm64
          cache-to: type=gha,mode=max,scope=arm64-${{ matrix.service }}
          pull: false

  merge-manifest:
    name: Merge manifest (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - run: |
          docker buildx imagetools create \
            -t grover1249/a3b-${{ matrix.service }}:latest \
            grover1249/a3b-${{ matrix.service }}:amd64 \
            grover1249/a3b-${{ matrix.service }}:arm64

  deploy:
    name: Deploy → Dokploy
    runs-on: ubuntu-latest
    needs: [merge-manifest]
    steps:
      - run: |
          curl -s -X POST "http://163.176.155.185:3000/api/compose.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"composeId": "qvQyYaNuIbH8PncF780uU"}'
